<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kislány kalandjai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" />
  <link rel="stylesheet" href="../../shared/css/base.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back-link" href="../../index.html">← Összes Játék</a>

  <div class="game-area">
    <header style="text-align:center">
      <h1 style="font-size:2rem; color:var(--color-primary)">Kislány kalandjai</h1>
      <p style="color:var(--color-muted)">Irányítsd a nyilakkal · ⬆ ugrás · ⬇ guggolás · ⬅ ➡ mozgás</p>
    </header>

    <div class="status-bar">
      <span>❤️ <strong id="lives">3</strong></span>
      <span>Pont: <strong id="score">0</strong></span>
      <span>Szint: <strong id="level">1</strong></span>
    </div>

    <canvas id="gameCanvas" width="700" height="320"></canvas>

    <div id="overlay" class="overlay">
      <div class="overlay-box">
        <div id="overlay-emoji">🌟</div>
        <div id="overlay-title">Kislány kalandjai</div>
        <div id="overlay-sub">Nyilakkal irányítsd a kislányt,<br>kerüld el az akadályokat!</div>
        <button class="btn btn-primary" id="action-btn">Játék indítása</button>
      </div>
    </div>

    <div id="settings-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h2 style="color:var(--color-primary); font-size:1.5rem; margin-bottom:1.5rem">Beállítások</h2>

        <div class="settings-group">
          <label style="display:block; margin-bottom:0.5rem; font-weight:700">Világ:</label>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
            <button class="btn-option active" data-setting="world" data-value="1">🌾 Rét</button>
            <button class="btn-option" data-setting="world" data-value="2">🌲 Erdő</button>
            <button class="btn-option" data-setting="world" data-value="random">🎲 Random</button>
          </div>
        </div>

        <div class="settings-group">
          <label style="display:block; margin-bottom:0.5rem; font-weight:700">Nehézség:</label>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
            <button class="btn-option" data-setting="difficulty" data-value="easy">😊 Könnyű</button>
            <button class="btn-option active" data-setting="difficulty" data-value="normal">😐 Normál</button>
            <button class="btn-option" data-setting="difficulty" data-value="hard">😤 Nehéz</button>
          </div>
        </div>

        <div class="settings-group">
          <label style="display:block; margin-bottom:0.5rem; font-weight:700">Akadályok:</label>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
            <button class="btn-option active" data-setting="obstacles" data-value="all">🎯 Összes</button>
            <button class="btn-option" data-setting="obstacles" data-value="birds">🐦 Csak madár</button>
            <button class="btn-option" data-setting="obstacles" data-value="ground">🪨 Csak föld</button>
          </div>
        </div>

        <button class="btn btn-primary" id="settings-start-btn" style="margin-top:1.5rem">Játék indítása</button>
      </div>
    </div>
  </div>

  <script src="../../shared/js/utils.js"></script>
  <script src="game.js"></script>
</body>
</html>
